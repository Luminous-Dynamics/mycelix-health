<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#040A0C">
    <title>Mycelix Health — Biological Sovereignty</title>
    <link data-trunk rel="css" href="style/main.css">
    <link data-trunk rel="rust" data-wasm-opt="z">
    <style>
        /* Inter font — loaded async */
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 100 900;
            font-display: swap;
            src: url('https://fonts.gstatic.com/s/inter/v18/UcC73FwrK3iLTeHuS_nVMrMxCp50SjIa2JL7W0Q5n-wU.woff2') format('woff2');
        }
    </style>
</head>
<body>
    <noscript>Mycelix Health requires JavaScript for the biological sovereignty portal.</noscript>
    <script>
        // Holochain conductor probe — checks if a conductor is running on port 8888.
        // Sets window.__HC_STATUS for the WASM app to read on mount.
        window.__HC_STATUS = "connecting";
        (function() {
            const ws = new WebSocket("ws://localhost:8888");
            const timeout = setTimeout(() => {
                ws.close();
                window.__HC_STATUS = "mock";
                console.log("[health] No conductor — running with mock data");
            }, 3000);
            ws.onopen = () => {
                clearTimeout(timeout);
                ws.close();
                window.__HC_STATUS = "connected";
                console.log("[health] Conductor detected on ws://localhost:8888");
            };
            ws.onerror = () => {
                clearTimeout(timeout);
                window.__HC_STATUS = "mock";
                console.log("[health] No conductor — running with mock data");
            };
        })();
    </script>
</body>
</html>
