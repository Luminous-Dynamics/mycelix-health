server {
    listen 80;
    server_name _;

    # SPA fallback — all routes serve index.html
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Frame-Options "DENY";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Content-Security-Policy "default-src 'self' ws://localhost:8888; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.gstatic.com; font-src https://fonts.gstatic.com";
    }

    # WASM files — cache aggressively
    location ~* \.wasm$ {
        root /usr/share/nginx/html;
        add_header Content-Type application/wasm;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # WebSocket proxy to conductor
    location /ws {
        proxy_pass http://conductor:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
