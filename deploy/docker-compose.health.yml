# Mycelix Health — One-Command Hospital Deployment
#
# Usage: docker-compose -f deploy/docker-compose.health.yml up -d
#
# This starts:
#   1. Holochain conductor with health DNA installed
#   2. Lair keystore for key management
#   3. Portal static server (Leptos WASM)
#   4. FHIR gateway for Epic/Cerner connectivity
#
# Prerequisites:
#   - Docker + Docker Compose
#   - dna/health.dna must be built (see scripts/pack-and-run.sh)
#   - FHIR OAuth credentials in .env file
#
# Based on: mycelix-workspace/deploy/docker-compose.prod.yml

version: "3.8"

services:
  conductor:
    image: holochain/holochain:0.6.0
    container_name: mycelix-health-conductor
    volumes:
      - conductor-data:/data
      - ./dna/health.dna:/happ/health.dna:ro
      - ./happ.yaml:/happ/happ.yaml:ro
    environment:
      - RUST_LOG=warn,holochain=info
      - HC_ADMIN_PORT=4444
    ports:
      - "8888:8888"   # App WebSocket (portal connects here)
      - "4444:4444"   # Admin WebSocket
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888"]
      interval: 30s
      timeout: 10s
      retries: 3

  portal:
    image: nginx:alpine
    container_name: mycelix-health-portal
    volumes:
      - ../mycelix-portal/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx-health.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "443:443"     # HTTPS (production)
      - "80:80"       # HTTP redirect
    depends_on:
      - conductor
    restart: unless-stopped

  fhir-gateway:
    image: node:20-alpine
    container_name: mycelix-health-fhir
    working_dir: /app
    volumes:
      - ./services/ehr-gateway:/app:ro
    command: ["node", "dist/index.js"]
    environment:
      - FHIR_BASE_URL=${FHIR_BASE_URL:-https://fhir.epic.com/interconnect-fhir-oauth/api/FHIR/R4}
      - FHIR_CLIENT_ID=${FHIR_CLIENT_ID}
      - FHIR_CLIENT_SECRET=${FHIR_CLIENT_SECRET}
      - HC_APP_URL=ws://conductor:8888
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - conductor
    restart: unless-stopped

volumes:
  conductor-data:
    driver: local
