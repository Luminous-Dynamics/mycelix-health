# cargo-deny configuration for mycelix-health workspace
# Derived from the Symthaea deny.toml template
# https://embarkstudios.github.io/cargo-deny/

[advisories]
ignore = [
    # Bincode unmaintained (transitive dep via holochain, no replacement available)
    "RUSTSEC-2025-0141",
    # paste crate unmaintained (transitive dep via holochain/wasmtime)
    "RUSTSEC-2024-0436",
    # proc-macro-error unmaintained (transitive dep via holochain derive macros)
    "RUSTSEC-2024-0370",
    # number_prefix unmaintained (transitive dep, no security impact)
    "RUSTSEC-2025-0119",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
    "AGPL-3.0-or-later",
    "AGPL-3.0-only",
    "Unlicense",
    "CDLA-Permissive-2.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
    "bzip2-1.0.6",
    "CAL-1.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "lowest-version"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
